<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Word Search Solver</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>
<body>
  <div class="app">
    <header>
      <h1>WORD SEARCH // SOLVER</h1>
      <p class="tag">Upload. Decode. Highlight.</p>
    </header>

    <section class="controls">
      <div class="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div id="scannerBox"></div>
      </div>
      <button id="captureBtn">Capture</button>

      <div class="search-box">
        <input type="text" id="wordInput" placeholder="Enter word..." disabled />
        <button id="searchBtn" disabled>Search</button>
      </div>
    </section>

    <section id="reviewSection" class="review hidden"></section>

    <section class="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </section>

    <section class="status">
      <p id="statusText">Awaiting image...</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>
</html>
