<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Neon Word Search Solver</title>
  <link rel="stylesheet" href="style.css" />
  <script src="https://cdn.jsdelivr.net/npm/tesseract.js@5/dist/tesseract.min.js"></script>
</head>

<body>
  <div class="app">
    <header>
      <h1>WORD SEARCH // SOLVER</h1>
      <p class="tag">Upload. Decode. Highlight.</p>
    </header>

    <section class="controls">
      <div class="camera-wrapper">
        <video id="video" autoplay playsinline></video>
        <div id="scannerBox">
          <div class="resize-handle nw"></div>
          <div class="resize-handle ne"></div>
          <div class="resize-handle sw"></div>
          <div class="resize-handle se"></div>
        </div>
        <div class="shape-controls">
          <button class="shape-btn active" data-shape="square">Square (Grid)</button>
          <button class="shape-btn" data-shape="vertical">Vertical (List)</button>
          <button class="shape-btn" data-shape="horizontal">Horizontal (List)</button>
        </div>
        <div class="zoom-controls">
          <label for="zoomSlider">Zoom: <span id="zoomLabel">1.0x</span></label>
          <input type="range" id="zoomSlider" min="1" max="3" step="0.1" value="1">
        </div>
      </div>
      <button id="captureBtn">Capture</button>
      <button id="clearBtn" class="danger-btn">Clear Board</button>

      <div class="search-box">
        <input type="text" id="wordInput" placeholder="Enter word..." disabled />
        <button id="searchBtn" disabled>Search</button>
      </div>
    </section>

    <section class="word-bank">
      <h2>Word Bank</h2>
      <button id="scanWordBankBtn">Scan Word Bank</button>
      <div id="wordBankList" class="word-bank-list"></div>
    </section>

    <section id="reviewSection" class="review hidden"></section>

    <section class="canvas-wrapper">
      <canvas id="canvas"></canvas>
    </section>

    <section class="status">
      <p id="statusText">Awaiting image...</p>
    </section>
  </div>

  <script src="app.js"></script>
</body>

</html>
